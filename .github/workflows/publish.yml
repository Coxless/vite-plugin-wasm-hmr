name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4
        with:
          install: true

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Publish Beta
        if: contains(github.ref, 'beta')
        run: pnpm publish --tag beta --no-git-checks

      - name: Publish Latest
        if: "!contains(github.ref, 'beta')"
        run: pnpm publish --no-git-checks
